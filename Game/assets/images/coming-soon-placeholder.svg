<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Black background -->
  <rect width="400" height="300" fill="#000000"/>
  
  <!-- Green border -->
  <rect x="10" y="10" width="380" height="280" fill="none" stroke="#39ff14" stroke-width="2" rx="5"/>
  
  <!-- Inner glow effect -->
  <rect x="15" y="15" width="370" height="270" fill="none" stroke="#39ff14" stroke-width="1" opacity="0.3" rx="4"/>
  
  <!-- "COMING SOON" text -->
  <text x="200" y="140" font-family="Courier New, monospace" font-size="28" fill="#39ff14" text-anchor="middle" letter-spacing="3">
    COMING SOON
  </text>
  
  <!-- Subtext -->
  <text x="200" y="170" font-family="Courier New, monospace" font-size="14" fill="#33ff33" text-anchor="middle" opacity="0.7">
    Game content will appear here
  </text>
  
  <!-- Decorative scanline effect (optional) -->
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="#39ff14" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#scanlines)"/>
  
  <!-- Glow effect around text -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="200" y="140" font-family="Courier New, monospace" font-size="28" fill="#39ff14" text-anchor="middle" letter-spacing="3" filter="url(#glow)" opacity="0.5">
    COMING SOON
  </text>
</svg>
